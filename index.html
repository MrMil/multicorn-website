<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מולטיקורן — עפר מוסטיגמן</title>
  <meta name="description" content="מולטיקורן — עפר מוסטיגמן: תכנות, הדפסה בתלת מימד, ייצור אלקטרוניקה בהזמנה אישית">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --magenta: #ff2eb9;
      --purple: #a06bff;
      --purple-dim: #7c4fd0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      font-family: 'Heebo', 'Segoe UI', Tahoma, Arial, sans-serif;
      color: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    main {
      text-align: center;
      max-width: 42rem;
    }
    .logo {
      width: min(19rem, 62vw);
      height: auto;
      filter: drop-shadow(0 0 45px rgba(160, 107, 255, 0.35));
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      margin-top: 1.5rem;
      font-size: clamp(2.8rem, 9vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, var(--magenta), var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .name {
      margin-top: 0.4rem;
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      font-weight: 600;
      color: var(--purple);
    }
    .divider {
      width: 5.5rem;
      height: 2px;
      margin: 1.6rem auto;
      border: none;
      background: linear-gradient(90deg, transparent, var(--magenta), transparent);
    }
    .services {
      font-size: clamp(1.05rem, 3.2vw, 1.35rem);
      font-weight: 300;
      line-height: 1.8;
      color: var(--purple);
    }
    .services strong {
      font-weight: 600;
      color: var(--magenta);
    }
    .contact {
      margin-top: 2.2rem;
    }
    .contact a {
      display: inline-block;
      direction: ltr;
      font-size: clamp(1rem, 3vw, 1.2rem);
      color: var(--magenta);
      text-decoration: none;
      border: 1px solid var(--purple-dim);
      border-radius: 999px;
      padding: 0.65rem 1.8rem;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    }
    .contact a:hover {
      border-color: var(--magenta);
      box-shadow: 0 0 25px rgba(255, 46, 185, 0.35);
      transform: translateY(-2px);
    }
    a:focus-visible {
      outline: 3px solid var(--magenta);
      outline-offset: 3px;
      border-radius: 4px;
    }
    footer {
      position: fixed;
      bottom: 0;
      inset-inline: 0;
      padding: 0.9rem 1rem;
      text-align: center;
      font-size: 0.95rem;
    }
    footer a {
      color: var(--purple);
      text-decoration: underline;
      text-underline-offset: 0.25em;
    }
    footer a:hover {
      color: var(--magenta);
    }
    @media (prefers-reduced-motion: reduce) {
      .logo { animation: none; }
      .contact a { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="assets/logo.png" alt="הלוגו של מולטיקורן — חד־קרן סגול עם קרניים בצבע מג'נטה">
    <h1>מולטיקורן</h1>
    <p class="name">עפר מוסטיגמן</p>
    <hr class="divider">
    <p class="services">
      <strong>תכנות</strong>
      &nbsp;·&nbsp;
      <strong>הדפסה בתלת מימד</strong>
      &nbsp;·&nbsp;
      <strong>ייצור אלקטרוניקה בהזמנה אישית</strong>
    </p>
    <p class="contact">
      <a href="mailto:contact@multicorn.co.il">contact@multicorn.co.il</a>
    </p>
  </main>
  <footer>
    <a href="accessibility.html">הצהרת נגישות</a>
  </footer>
</body>
</html>
